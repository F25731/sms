<!doctype html>

  <body>
    <main class="shell redeem-shell">
      <section class="glass-panel redeem-panel" aria-label="OAS SMS RELAY">
        <div class="hero-copy">
          <p class="eyebrow">OAS SMS RELAY</p>
          <p class="subtitle">&#x8F93;&#x5165; CDK &#x81EA;&#x52A8;&#x5206;&#x914D;&#x53F7;&#x7801; · &#x5B9E;&#x65F6;&#x63A5;&#x6536;&#x9A8C;&#x8BC1;&#x7801;</p>

              id="code"
              name="code"
              type="text"
              inputmode="text"
              placeholder="SMS-XXXX-XXXX-XXXX"
              spellcheck="false"
              required

              <span>&#x67E5;&#x770B;&#x53F7;&#x7801;</span>
              <span class="button-icon" aria-hidden="true">&rarr;</span>
            </button>

          <p id="message" class="message" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="/redeem.js?v=20260615-3"></script>
